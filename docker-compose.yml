services:
  postgres:
    image: ankane/pgvector:latest
    container_name: rag-postgres
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rag-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    networks:
      - rag-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  redis:
    image: redis:7-alpine
    container_name: rag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rag-network
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Neo4j: use Aura remotely — set NEO4J_URI, NEO4J_USERNAME, NEO4J_PASSWORD in .env
  # (Uncomment below to run Neo4j locally instead.)
  # neo4j:
  #   image: neo4j:5-community
  #   container_name: rag-neo4j
  #   ports:
  #     - "7474:7474"
  #     - "7687:7687"
  #   environment:
  #     NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
  #   volumes:
  #     - neo4j_data:/data
  #   networks:
  #     - rag-network
  #   restart: unless-stopped

  backend:
    build: ./backend
    container_name: rag-backend
    ports:
      - "0.0.0.0:8000:8000"
    environment:
      - OPERATION_MODE=${OPERATION_MODE:-hybrid}
      - DATABASE_URL=postgresql+asyncpg://raguser:${DB_PASSWORD:-changeme}@postgres/ragdb
      - QDRANT_URL=http://qdrant:6333
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - UPLOAD_DIR=/app/storage/documents
      - VLLM_URL=${VLLM_URL:-http://host.docker.internal:8000/v1}
      - LOCAL_EMBED_MODEL=${LOCAL_EMBED_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      - VECTOR_STORE_TYPE=${VECTOR_STORE_TYPE:-qdrant}
      - REDIS_URL=redis://redis:6379
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SECRET_KEY=${SECRET_KEY:-changeme-in-prod}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}
      - NEO4J_URI=${NEO4J_URI:-bolt://localhost:7687}
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
    volumes:
      - document_storage:/app/storage/documents
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - rag-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build: ./frontend
    container_name: rag-frontend
    ports:
      - "3000:80"
    # Same service name as Northflank internal DNS when both services share a project network.
    environment:
      - NGINX_PROXY_API_UPSTREAM=http://backend:8000
    depends_on:
      - backend
    networks:
      - rag-network
    restart: unless-stopped

  # Optional: uncomment to put nginx in front (then use http://localhost for UI)
  # nginx:
  #   image: nginx:alpine
  #   container_name: rag-nginx
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - backend
  #     - frontend
  #   networks:
  #     - rag-network
  #   restart: unless-stopped

  # Optional: vLLM service for local inference
  # Uncomment and configure if you want vLLM in Docker
  # vllm:
  #   image: vllm/vllm-openai:latest
  #   container_name: rag-vllm
  #   runtime: nvidia
  #   ports:
  #     - "8001:8000"
  #   environment:
  #     - NVIDIA_VISIBLE_DEVICES=all
  #   volumes:
  #     - ~/.cache/huggingface:/root/.cache/huggingface
  #   command: >
  #     --model mistralai/Mistral-7B-Instruct-v0.3
  #     --tensor-parallel-size 1
  #     --max-model-len 8192
  #   networks:
  #     - rag-network

volumes:
  postgres_data:
  qdrant_data:
  document_storage:
  redis_data:
  # neo4j_data:  # only if running local neo4j

networks:
  rag-network:
    driver: bridge
