# Fly.io config for Entity Extractor backend (OOCP)
# Run: fly launch (first time) then fly deploy
# Secrets: fly secrets set OPENROUTER_API_KEY=xxx NEO4J_URI=bolt://... NEO4J_USERNAME=neo4j NEO4J_PASSWORD=xxx

app = "ee-backend"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[[http_service.checks]]
  interval = "15s"
  timeout = "2s"
  path = "/api"
